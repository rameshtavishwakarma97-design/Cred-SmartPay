<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Simulated Phone Screen</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .lock-screen {
      position: relative;
      width: 100%;
      height: 100vh;
      max-width: 400px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 56px;
    }

    /* Wallpaper background — changes with category */
    .wallpaper {
      position: absolute;
      inset: 0;
      background: var(--wp-bg, linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%));
      z-index: 0;
      transition: background 0.5s ease;
    }

    /* Subtle blurred ambient circles */
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
    }
    .glow-1 { width: 260px; height: 260px; top: -60px; left: -60px; background: var(--glow-a, #7c3aed); }
    .glow-2 { width: 220px; height: 220px; bottom: 80px; right: -40px; background: var(--glow-b, #0ea5e9); }

    .lock-content { position: relative; z-index: 1; width: 100%; display: flex; flex-direction: column; align-items: center; }

    /* Notch */
    .notch {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 34px;
      background: #000;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
      z-index: 10;
    }

    /* Status bar */
    .status-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 8px 20px 0;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
    }
    .status-right { display: flex; gap: 6px; align-items: center; }

    /* Clock & date */
    .time {
      font-size: 80px;
      font-weight: 200;
      letter-spacing: -2px;
      color: white;
      text-shadow: 0 4px 24px rgba(0,0,0,0.4);
      margin: 28px 0 6px;
      line-height: 1;
    }
    .date {
      font-size: 17px;
      font-weight: 400;
      color: rgba(255,255,255,0.88);
      margin-bottom: 36px;
      letter-spacing: 0.2px;
    }

    /* Notifications container */
    .notifications-container {
      width: 100%;
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* --- Group label --- */
    .notif-group-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0 4px 4px;
    }

    /* Base notification */
    .notification {
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      cursor: pointer;
      transform: translateY(-16px);
      opacity: 0;
      animation: slideDown 0.55s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18), 0 1px 0 rgba(255,255,255,0.15) inset;
      transition: transform 0.18s, box-shadow 0.18s;
      position: relative;
      overflow: hidden;
    }
    .notification:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(0,0,0,0.2); }

    /* Glimmer strip on interactive notification */
    .notification.primary::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-strip, #7c3aed), transparent);
      opacity: 0.7;
    }

    /* Staggered animations */
    .notification:nth-child(1) { animation-delay: 0.1s; }
    .notification:nth-child(2) { animation-delay: 0.35s; }
    .notification:nth-child(3) { animation-delay: 0.55s; }

    @keyframes slideDown {
      from { transform: translateY(-16px); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    /* Icon */
    .notif-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }

    /* Text */
    .notif-content { flex: 1; min-width: 0; }
    .notif-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3px;
    }
    .notif-app-name {
      color: #333;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .notif-time { color: #888; font-size: 12px; }
    .notif-title { color: #111; font-weight: 700; font-size: 14.5px; margin-bottom: 2px; }
    .notif-desc { color: #555; font-size: 13.5px; line-height: 1.35; }

    /* Tag chip */
    .notif-tag {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--tag-bg, rgba(124,58,237,0.12));
      color: var(--tag-color, #7c3aed);
      letter-spacing: 0.3px;
    }

    /* Tap hint */
    .tap-hint {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.3px;
      display: flex; align-items: center; gap: 6px;
      animation: pulse 2s ease-in-out infinite 1.5s;
    }
    @keyframes pulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.85; } }

    /* CRED badge on home indicator */
    .home-indicator {
      position: absolute;
      bottom: 14px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
    }
  </style>
</head>

    // =====================================================

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function pickIdx(arr) {
      const idx = Math.floor(Math.random() * arr.length);
      return { value: arr[idx], idx };
    }

    document.documentElement.style.setProperty('--accent-strip', scenario.accentStrip);

    // =====================================================

      document.getElementById('status-time').textContent = `${hh}:${mm}`;

      const opts = { weekday: 'long', month: 'long', day: 'numeric' };
      document.getElementById('date-display').textContent = now.toLocaleDateString('en-IN', opts);
    }
    setInterval(updateClock, 10000);
    updateClock();

    // =====================================================
    // BUILD NOTIFICATIONS

    function relativeTime() {
      const mins = Math.floor(Math.random() * 3);
      return mins === 0 ? 'now' : `${mins}m ago`;

          </div>
          <div class="notif-title">${a.title}</div>
          <div class="notif-desc">${a.desc}</div>

      `;
      container.appendChild(div);
    });

    // Render the MAIN interactive payment notification (always last = on top visually)
    const mainDiv = document.createElement('div');
    mainDiv.className = 'notification primary';
    mainDiv.style.animationDelay = `${(numAmbient + 1) * 0.2}s`;
    mainDiv.style.setProperty('--accent-strip', scenario.accentStrip);

      <div class="notif-icon-wrap" style="background:${scenario.bgColor}; box-shadow: 0 4px 14px ${scenario.bgColor}55;">

      </div>

    `;
    mainDiv.addEventListener('click', () => triggerSmartPay());
    container.appendChild(mainDiv);

    // Also make ambient notifications non-interactive but feel alive
    container.querySelectorAll('.notification:not(.primary)').forEach(n => {
      n.style.cursor = 'default';
      n.style.opacity = '0.9';
    });

    // =====================================================
    // TRIGGER SMART PAY
    // =====================================================
    function triggerSmartPay() {
      const baseUrl = window.location.origin + '/';
      const url = `${baseUrl}?merchant=${scenario.merchantId}&category=${scenario.category}&amount=${amount}&orderId=${orderId}`;

      // Visual feedback
      mainDiv.style.transform = 'scale(0.96)';
      mainDiv.style.opacity = '0.85';

      setTimeout(() => { window.location.href = url; }, 280);
    }
  </script>
